<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>SI-CERDIK PKH</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #eef2f7;
}

.container {
    width: 800px;
    margin: auto;
    margin-top: 40px;
    background: white;
    padding: 25px;
    border-radius: 15px;
}

h1 {
    text-align: center;
    color: #2563eb;
}

.subtitle {
    text-align: center;
    color: gray;
    margin-bottom: 20px;
}

.row {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.upload-box {
    border: 2px dashed #3b82f6;
    padding: 40px;
    text-align: center;
    border-radius: 10px;
    color: #3b82f6;
    cursor: pointer;
}

.upload-box:hover {
    background: #f0f7ff;
}

.buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: white;
}

.btn-blue {
    background: #2563eb;
}

.btn-green {
    background: #10b981;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
}
</style>

</head>
<body>

<div class="container">
    <h1>✨ SI-CERDIK PKH</h1>
    <div class="subtitle">
        Sistem Cetak Formulir Verifikasi Pendidikan PKH - Praktis, Cepat, dan Rapi
    </div>

    <div class="row">
        <input type="text" id="kab" placeholder="📍 Kabupaten / Kota">
        <input type="text" id="nama" placeholder="✍️ Nama Pendamping (TTD)">
        <input type="text" id="nip" placeholder="🆔 NIP Pendamping">
    </div>

    <div class="upload-box" onclick="document.getElementById('file').click()">
        📁 Klik atau Tarik File CSV di sini
        <input type="file" id="file" accept=".csv" hidden>
    </div>

    <div class="buttons">
        <button class="btn-blue" onclick="generate()">⚙️ GENERATE FORM</button>
        <button class="btn-green" onclick="window.print()">🧾 SIMPAN PDF / CETAK</button>
    </div>

    <table id="tabel">
        <thead></thead>
        <tbody></tbody>
    </table>
</div>

<script>
let dataCSV = [];

document.getElementById("file").addEventListener("change", function(e){
    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = function(event){
        let text = event.target.result;
        parseCSV(text);
    };

    reader.readAsText(file);
});

function parseCSV(text){
    let rows = text.split("\n").map(r => r.split(","));
    dataCSV = rows;
}

function generate(){
    if(dataCSV.length === 0){
        alert("Upload file CSV dulu!");
        return;
    }

    let thead = document.querySelector("#tabel thead");
    let tbody = document.querySelector("#tabel tbody");

    thead.innerHTML = "";
    tbody.innerHTML = "";

    // header
    let headerRow = "<tr>";
    dataCSV[0].forEach(h => headerRow += `<th>${h}</th>`);
    headerRow += "</tr>";
    thead.innerHTML = headerRow;

    // data
    for(let i=1; i<dataCSV.length; i++){
        let row = "<tr>";
        dataCSV[i].forEach(d => row += `<td>${d}</td>`);
        row += "</tr>";
        tbody.innerHTML += row;
    }
}
</script>

</body>
</html>
